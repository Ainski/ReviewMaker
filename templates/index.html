<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文献综述 Agent 工具</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --primary: #4F46E5;
    --primary-dark: #3730A3;
    --primary-light: #EEF2FF;
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --text: #1E293B;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --success: #10B981;
    --warning: #F59E0B;
    --error: #EF4444;
    --radius: 10px;
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.07), 0 2px 4px -2px rgb(0 0 0 / 0.05);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ========== SIDEBAR ========== */
  .sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 10;
    box-shadow: var(--shadow-md);
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
  }
  .sidebar-header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .sidebar-header p {
    font-size: 0.75rem;
    opacity: 0.75;
    margin-top: 2px;
  }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    transition: all 0.15s;
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
    background: var(--surface);
  }
  .form-row {
    display: flex;
    gap: 12px;
  }
  .form-row .form-group { flex: 1; }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
  }
  .toggle-row span {
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .toggle-switch {
    position: relative;
    width: 44px; height: 24px;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: #CBD5E1;
    border-radius: 24px;
    cursor: pointer;
    transition: 0.2s;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--primary); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.3); }
  .btn-primary:disabled { background: #A5B4FC; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary {
    background: var(--bg);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    margin-top: 8px;
  }
  .btn-secondary:hover { background: var(--border); }

  /* ========== MAIN ========== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Progress bar */
  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #818CF8);
    transition: width 0.5s ease;
    border-radius: 0 2px 2px 0;
    width: 0%;
  }
  .progress-status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-secondary);
  }
  .progress-status .step-text { display: flex; align-items: center; gap: 8px; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  .spinner.active { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Content area */
  .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .tab {
    padding: 14px 20px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: none;
    border-top: none; border-left: none; border-right: none;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

  .tab-content { flex: 1; overflow-y: auto; padding: 24px; display: none; }
  .tab-content.active { display: block; }

  /* Review markdown styling */
  .markdown-body { max-width: 860px; line-height: 1.85; }
  .markdown-body h1 { font-size: 1.5rem; margin: 28px 0 12px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .markdown-body h2 { font-size: 1.2rem; margin: 24px 0 10px; color: var(--primary-dark); }
  .markdown-body h3 { font-size: 1.05rem; margin: 20px 0 8px; }
  .markdown-body p { margin: 10px 0; }
  .markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
  .markdown-body th { background: var(--primary); color: white; padding: 10px 12px; text-align: left; font-weight: 600; }
  .markdown-body td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .markdown-body tr:nth-child(even) td { background: #F8FAFC; }
  .markdown-body strong { color: var(--text); }
  .markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 10px 0; }
  .markdown-body li { margin: 4px 0; }

  /* Image panels */
  .img-panel { text-align: center; margin: 16px 0; }
  .img-panel img { max-width: 100%; border-radius: var(--radius); box-shadow: var(--shadow-md); border: 1px solid var(--border); }
  .img-panel .caption { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; }

  /* Stats cards */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-card .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--primary); }
  .stat-card .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

  /* Paper list */
  .paper-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    transition: box-shadow 0.15s;
  }
  .paper-card:hover { box-shadow: var(--shadow-md); }
  .paper-card .paper-index { display: inline-block; background: var(--primary); color: white; width: 26px; height: 26px; text-align: center; line-height: 26px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; margin-right: 10px; }
  .paper-card .paper-title { font-weight: 600; font-size: 0.95rem; }
  .paper-card .paper-meta { font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px; }
  .paper-card .paper-meta span { margin-right: 14px; }
  .paper-card .paper-innovation { font-size: 0.82rem; color: var(--text-secondary); margin-top: 6px; padding-left: 36px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; }
  .badge-code { background: #D1FAE5; color: #065F46; }
  .badge-cat { background: var(--primary-light); color: var(--primary-dark); }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-muted); text-align: center; padding: 40px;
  }
  .empty-state .icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 8px; }
  .empty-state p { font-size: 0.85rem; max-width: 360px; }

  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; min-width: 0; max-height: 50vh; }
  }
</style>
</head>
<body>

<!-- ====== SIDEBAR ====== -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>📚 文献综述 Agent</h1>
    <p>AI-Powered Literature Review Tool</p>
  </div>
  <div class="sidebar-body">
    <div class="form-group">
      <label>🔍 研究主题</label>
      <input type="text" id="input-topic" placeholder="例如: Transformer attention mechanisms" value="Transformer attention mechanism">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>📄 论文数量</label>
        <input type="number" id="input-max-papers" value="15" min="5" max="50">
      </div>
      <div class="form-group">
        <label>📅 年份范围</label>
        <input type="number" id="input-year-range" value="5" min="1" max="10">
      </div>
    </div>
    <div class="toggle-row">
      <span>跳过代码搜索</span>
      <label class="toggle-switch"><input type="checkbox" id="input-no-code"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>跳过海报生成</span>
      <label class="toggle-switch"><input type="checkbox" id="input-no-poster"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>🚀 RAG 全文增强 <small style="color:#94A3B8">(下载PDF提取全文)</small></span>
      <label class="toggle-switch"><input type="checkbox" id="input-use-rag"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>🤖 多Agent协作模式</span>
      <label class="toggle-switch"><input type="checkbox" id="input-use-agent" checked><span class="toggle-slider"></span></label>
    </div>
    <button class="btn btn-primary" id="btn-start" onclick="startJob()">🚀 开始生成综述</button>
    <button class="btn btn-secondary" id="btn-clear" onclick="clearResults()" disabled>🗑 清除结果</button>
  </div>
</aside>

<!-- ====== MAIN AREA ====== -->
<main class="main">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>

  <!-- Status bar -->
  <div class="progress-status">
    <div class="step-text">
      <div class="spinner" id="spinner"></div>
      <span id="status-text">就绪 — 请在左侧输入主题并点击开始</span>
    </div>
    <span id="status-progress">—</span>
  </div>

  <!-- Content area -->
  <div class="content" id="content-area">
    <div class="empty-state" id="empty-state">
      <div class="icon">📖</div>
      <h3>开始你的文献综述</h3>
      <p>在左侧输入研究主题，AI 将自动抓取最新论文、分析创新点、生成结构化综述与可视化图表。</p>
    </div>

    <!-- Tabs (hidden initially) -->
    <div class="tabs" id="tabs-bar" style="display: none;">
      <button class="tab active" data-tab="tab-review">📝 综述正文</button>
      <button class="tab" data-tab="tab-papers">📋 论文列表</button>
      <button class="tab" data-tab="tab-evolution">📈 算法演进图</button>
      <button class="tab" data-tab="tab-poster">🎨 海报</button>
      <button class="tab" data-tab="tab-refs">📎 参考文献</button>
    </div>

    <div class="tab-content active" id="tab-review">
      <div class="markdown-body" id="review-content"></div>
    </div>
    <div class="tab-content" id="tab-papers">
      <div id="papers-content"></div>
    </div>
    <div class="tab-content" id="tab-evolution">
      <div class="img-panel"><img id="img-evolution" src="" alt="算法演进图"><div class="caption">算法演进时间线 — 展示论文按年份和方法类别的分布</div></div>
    </div>
    <div class="tab-content" id="tab-poster">
      <div class="img-panel"><img id="img-poster" src="" alt="学术海报"><div class="caption">综合学术海报</div></div>
    </div>
    <div class="tab-content" id="tab-refs">
      <div id="refs-preview" style="font-size:0.85rem; line-height:1.8;"></div>
    </div>
  </div>
</main>

<script>
// ---- State ----
let currentJobId = null;
let pollTimer = null;
let jobResult = null;

// ---- Tab switching ----
document.getElementById('tabs-bar').addEventListener('click', (e) => {
  if (e.target.classList.contains('tab')) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById(e.target.dataset.tab).classList.add('active');
  }
});

// ---- API calls ----
async function startJob() {
  const topic = document.getElementById('input-topic').value.trim();
  if (!topic) { alert('请输入研究主题'); return; }

  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  btn.textContent = '⏳ 正在启动...';

  const config = {
    topic: topic,
    max_papers: parseInt(document.getElementById('input-max-papers').value) || 15,
    year_range: parseInt(document.getElementById('input-year-range').value) || 5,
    no_code_search: document.getElementById('input-no-code').checked,
    no_poster: document.getElementById('input-no-poster').checked,
    use_rag: document.getElementById('input-use-rag').checked,
    use_agent: document.getElementById('input-use-agent').checked,
  };

  try {
    const res = await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });
    const data = await res.json();
    if (data.error) { alert(data.error); btn.disabled = false; btn.textContent = '🚀 开始生成综述'; return; }

    currentJobId = data.job_id;
    showResults();
    document.getElementById('spinner').classList.add('active');
    document.getElementById('status-text').textContent = '初始化中...';
    document.getElementById('status-progress').textContent = '0%';
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('btn-clear').disabled = false;

    pollTimer = setInterval(pollProgress, 800);
  } catch(e) {
    alert('启动失败: ' + e.message);
    btn.disabled = false;
    btn.textContent = '🚀 开始生成综述';
  }
}

async function pollProgress() {
  if (!currentJobId) return;
  try {
    const res = await fetch(`/api/progress/${currentJobId}`);
    const data = await res.json();

    document.getElementById('status-text').textContent = data.step || '';
    document.getElementById('status-progress').textContent = Math.round(data.progress) + '%';
    document.getElementById('progress-bar').style.width = data.progress + '%';

    if (data.status === 'done') {
      clearInterval(pollTimer);
      document.getElementById('spinner').classList.remove('active');
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-start').textContent = '🚀 重新生成';
      jobResult = data.result;
      renderResults(data.result);
    } else if (data.status === 'error') {
      clearInterval(pollTimer);
      document.getElementById('spinner').classList.remove('active');
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-start').textContent = '🚀 开始生成综述';
      document.getElementById('status-text').textContent = '❌ 错误: ' + (data.message || '未知错误');
    }
  } catch(e) {
    console.error('Poll error:', e);
  }
}

function renderResults(result) {
  // Review tab — render markdown
  const reviewHtml = marked.parse(result.review_text || '');
  document.getElementById('review-content').innerHTML = reviewHtml;

  // Papers tab
  if (result.papers) {
    let papersHtml = '<div class="stats-grid">' +
      `<div class="stat-card"><div class="stat-value">${result.paper_count}</div><div class="stat-label">论文总数</div></div>` +
      `<div class="stat-card"><div class="stat-value">${result.papers.filter(p=>p.has_code).length}</div><div class="stat-label">含开源代码</div></div>` +
      `<div class="stat-card"><div class="stat-value">${result.validation.valid}/${result.validation.total}</div><div class="stat-label">引用覆盖</div></div>` +
      `<div class="stat-card"><div class="stat-value">${new Set(result.papers.map(p=>p.method_category)).size}</div><div class="stat-label">方法类别</div></div>` +
      '</div>';

    result.papers.forEach(p => {
      papersHtml += `<div class="paper-card">
        <span class="paper-index">${p.index}</span>
        <span class="paper-title">${p.title}</span>
        <div class="paper-meta">
          <span>👤 ${p.first_author}</span>
          <span>📅 ${p.year}</span>
          <span>📊 ${p.citations} 引用</span>
          <span class="badge badge-cat">${p.method_category}</span>
          ${p.has_code ? '<span class="badge badge-code">📦 有代码</span>' : ''}
        </div>
        ${p.key_innovation ? `<div class="paper-innovation">💡 ${p.key_innovation}</div>` : ''}
      </div>`;
    });
    document.getElementById('papers-content').innerHTML = papersHtml;
  }

  // Evolution tab
  if (result.files && result.files.evolution) {
    document.getElementById('img-evolution').src = result.files.evolution + '?t=' + Date.now();
  }

  // Poster tab
  if (result.files && result.files.poster) {
    document.getElementById('img-poster').src = result.files.poster + '?t=' + Date.now();
  }

  // References tab preview
  if (result.papers) {
    let refHtml = '';
    result.papers.forEach(p => {
      refHtml += `<p><strong>[${p.index}]</strong> ${p.first_author} (${p.year}). <em>${p.title}</em>.`;
      if (p.has_code) refHtml += ` <a href="${p.code_urls[0]}" target="_blank">[代码]</a>`;
      refHtml += '</p>';
    });
    document.getElementById('refs-preview').innerHTML = refHtml;
  }
}

function showResults() {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('tabs-bar').style.display = 'flex';
}

function clearResults() {
  currentJobId = null;
  jobResult = null;
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('spinner').classList.remove('active');
  document.getElementById('status-text').textContent = '就绪 — 请在左侧输入主题并点击开始';
  document.getElementById('status-progress').textContent = '—';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-start').textContent = '🚀 开始生成综述';
  document.getElementById('btn-clear').disabled = true;
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('tabs-bar').style.display = 'none';
  document.getElementById('review-content').innerHTML = '';
  document.getElementById('papers-content').innerHTML = '';
  document.getElementById('img-evolution').src = '';
  document.getElementById('img-poster').src = '';
  document.getElementById('refs-preview').innerHTML = '';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  document.querySelector('[data-tab="tab-review"]').classList.add('active');
  document.getElementById('tab-review').classList.add('active');
}
</script>

</body>
</html>
